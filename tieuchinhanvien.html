<script>
// KHỐI LOGIC ĐÁNH GIÁ CHUYÊN BIỆT: NHÂN VIÊN
function danhGiaNhanVien(thamSo, tonTai, passThangTot, passThangHT) {
    const kiemTraVuotMucNV = () => {
        let tuSo = 0;
        if (kiemTraChuoi(thamSo.sKien, /huyện|tỉnh|quốc/i)) tuSo++;
        if (kiemTraChuoi(thamSo.kNhiem, /xuất sắc/i)) tuSo++;
        return tuSo >= (3 * 0.3); // Mẫu số là 3
    };

    // BỔ SUNG: Hàm kiểm tra giá trị tồn tại (tránh việc để trống "-- Chọn mức --" vẫn được ghi nhận)
    const coGiaTri = (chuoi) => chuoi && chuoi.trim() !== "";

    let nv_XS = passThangTot && (!tonTai.phBinh || thamSo.phBinh === 0) &&
            (tonTai.chNghiep && kiemTraChuoi(thamSo.chNghiep, /tốt/i)) && 
            (tonTai.chMon && kiemTraChuoi(thamSo.chMon, /giỏi/i)) && 
            (tonTai.chBien && kiemTraChuoi(thamSo.chBien, /tốt/i)) && 
            (tonTai.sKien && thamSo.sKien.trim() !== "" && kiemTraChuoi(thamSo.sKien, /xã|huyện|cụm|tỉnh|quốc/i)) && 
            xetKiemNhiem(thamSo.kNhiem, 'XS') && kiemTraVuotMucNV();

    let nv_Tot = passThangTot && (!tonTai.phBinh || thamSo.phBinh === 0) && 
             (tonTai.chNghiep && kiemTraChuoi(thamSo.chNghiep, /khá|tốt/i)) && 
             (tonTai.chMon && kiemTraChuoi(thamSo.chMon, /khá|giỏi/i)) && 
             (tonTai.chBien && kiemTraChuoi(thamSo.chBien, /khá|tốt/i)) && 
             xetKiemNhiem(thamSo.kNhiem, 'Tốt');

    // CẬP NHẬT: Bắt buộc Chuẩn nghề nghiệp, Chuyên môn, Chuyển biến phải "coGiaTri" mới được tính là Hoàn thành
    let nv_HT = passThangHT && (!tonTai.phBinh || thamSo.phBinh <= 2) && 
            (tonTai.chNghiep && coGiaTri(thamSo.chNghiep) && !kiemTraChuoi(thamSo.chNghiep, /chưa đạt|kém/i)) && 
            (tonTai.chMon && coGiaTri(thamSo.chMon) && !kiemTraChuoi(thamSo.chMon, /yếu|kém/i)) &&
            (tonTai.chBien && coGiaTri(thamSo.chBien) && !kiemTraChuoi(thamSo.chBien, /chưa đạt|kém/i)) &&
            xetKiemNhiem(thamSo.kNhiem, 'HT');

    if (nv_XS) return { kqThanhLieu: "HOÀN THÀNH XUẤT SẮC NHIỆM VỤ", mauHienThi: "#28a745" };
    if (nv_Tot) return { kqThanhLieu: "HOÀN THÀNH TỐT NHIỆM VỤ", mauHienThi: "#007bff" };
    if (nv_HT) return { kqThanhLieu: "HOÀN THÀNH NHIỆM VỤ", mauHienThi: "#fd7e14" };
    
    return { kqThanhLieu: "CHƯA HOÀN THÀNH NHIỆM VỤ", mauHienThi: "#dc3545" };
}
</script>
